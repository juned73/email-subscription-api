# =============================================
# Server
# =============================================
server.port=8080

# =============================================
# DataSource — H2 file-based (persists across restarts)
# =============================================
spring.datasource.url=jdbc:h2:file:./data/subscriptions;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Email Validation — Abstract API
# Get your free key at: https://www.abstractapi.com/
# =============================================
spring.config.import=optional:file:.env[.properties]
email.validation.api.url=https://emailreputation.abstractapi.com/v1/
email.validation.api.key=${EMAIL_VALIDATION_API_KEY}

# =============================================
# HTTP Client timeouts
# =============================================
spring.mvc.async.request-timeout=10000
