version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subscription_app
    ports:
      - "8080:8080"
    environment:
      EMAIL_VALIDATION_API_KEY: ${EMAIL_VALIDATION_API_KEY}
    volumes:
      - h2_data:/app/data
    restart: on-failure

volumes:
  h2_data:
